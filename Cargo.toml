[package]
name = "rex"
version = "0.1.0"
edition = "2021"

[dependencies]
notify = "8.0.0"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["json", "gzip", "brotli", "deflate", "stream"] }
scraper = "0.17"
url = "2"
uuid = { version = "^1.3", features = ["v4"] }