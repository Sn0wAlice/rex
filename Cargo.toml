[package]
name = "rex"
version = "0.1.0"
edition = "2021"

[dependencies]
uuid = { version = "^1.3", features = ["v4"] }
tokio = { version = "1", features = ["full"] }
openssl = { version = "0.10", features = ["vendored"] }
reqwest = { version = "0.11", features = ["json", "gzip", "brotli", "deflate", "stream", "blocking"] }
scraper = "0.17"
url = "2"
regex = "1.7"
notify = "8.0.0"